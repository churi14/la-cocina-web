<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="https://www.lacocinaushuaia.com.ar/logo-burger.svg" type="image/svg+xml" />
  <title>La Burger Club – Ushuaia</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --accent: #e05c2a;
      --accent-dark: #b8421a;
      --accent-light: #ff7a47;
      --bg: #1a0d08;
      --surface: rgba(255,255,255,0.06);
      --border: rgba(255,255,255,0.1);
      --text: #fff5f0;
      --muted: rgba(255,245,240,0.55);
    }

    body {
      background-color: var(--bg);
      background-image:
        radial-gradient(ellipse 100% 60% at 50% 0%, rgba(224,92,42,0.35) 0%, transparent 65%),
        radial-gradient(ellipse 60% 40% at 80% 80%, rgba(224,92,42,0.12) 0%, transparent 60%);
      color: var(--text);
      font-family: 'Plus Jakarta Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px 24px 64px;
    }

    .page { width: 100%; max-width: 360px; display: flex; flex-direction: column; align-items: center; gap: 0; }

    /* Back link */
    .back {
      align-self: flex-start;
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.75rem;
      font-weight: 500;
      color: var(--muted);
      text-decoration: none;
      letter-spacing: 0.04em;
      margin-bottom: 36px;
      transition: color 0.18s;
    }
    .back:hover { color: var(--text); }
    .back svg { width: 14px; height: 14px; }

    /* Logo */
    .logo-wrap {
      width: 120px;
      height: 120px;
      border-radius: 28px;
      background: var(--surface);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      box-shadow: 0 0 60px rgba(224,92,42,0.25), 0 20px 40px rgba(0,0,0,0.4);
      animation: pop 0.6s cubic-bezier(0.34,1.56,0.64,1) both;
      margin-bottom: 28px;
    }
    .logo-wrap img { width: 100%; height: 100%; object-fit: cover; }

    /* Name */
    .brand-name {
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      color: var(--text);
      text-align: center;
      line-height: 1;
      animation: fadeUp 0.5s ease 0.1s both;
    }

    .brand-sub {
      font-size: 0.78rem;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--accent-light);
      margin-top: 8px;
      text-align: center;
      animation: fadeUp 0.5s ease 0.15s both;
    }

    /* Divider */
    .divider {
      width: 40px;
      height: 2px;
      background: var(--accent);
      border-radius: 2px;
      margin: 20px 0 28px;
      animation: fadeUp 0.5s ease 0.2s both;
    }

    /* Buttons */
    .actions {
      display: flex;
      flex-direction: column;
      gap: 12px;
      width: 100%;
      animation: fadeUp 0.5s ease 0.25s both;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 16px 20px;
      border-radius: 14px;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 0.95rem;
      font-weight: 700;
      letter-spacing: 0.01em;
      text-decoration: none;
      cursor: pointer;
      transition: all 0.2s ease;
      border: none;
    }

    .btn svg { width: 18px; height: 18px; flex-shrink: 0; }

    .btn-primary {
      background: var(--accent);
      color: #fff;
      box-shadow: 0 8px 24px rgba(224,92,42,0.4);
    }
    .btn-primary:hover {
      background: var(--accent-light);
      transform: translateY(-2px);
      box-shadow: 0 12px 32px rgba(224,92,42,0.5);
    }

    .btn-secondary {
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
      backdrop-filter: blur(8px);
    }
    .btn-secondary:hover {
      background: rgba(255,255,255,0.1);
      border-color: rgba(255,255,255,0.2);
      transform: translateY(-2px);
    }

    /* Footer */
    .footer {
      margin-top: 48px;
      display: flex;
      align-items: center;
      gap: 8px;
      animation: fadeUp 0.5s ease 0.35s both;
    }
    .footer img { width: 20px; opacity: 0.3; }
    .footer span { font-size: 0.7rem; color: var(--muted); letter-spacing: 0.06em; }

    @keyframes pop {
      from { opacity: 0; transform: scale(0.8); }
      to   { opacity: 1; transform: scale(1); }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="page">

    <a href="/negocios" class="back">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
      Nuestros negocios
    </a>

    <div class="logo-wrap">
      <img src="https://www.lacocinaushuaia.com.ar/logo-burger.svg" alt="La Burger Club" />
    </div>

    <div class="brand-name">La Burger Club</div>
    <div class="brand-sub">Ushuaia · Tierra del Fuego</div>
    <div class="divider"></div>

    <div class="actions">
      <a href="https://wa.me/542901569594" target="_blank" class="btn btn-primary">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"/></svg>
        Pedir acá
      </a>
      <a href="https://menu.fu.do/laburgerclub" target="_blank" class="btn btn-secondary">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
        Ver Menú
      </a>
    </div>

    <div class="footer">
      <img src="https://www.lacocinaushuaia.com.ar/logo-blanco.svg" alt="La Cocina" />
      <span>La Cocina Ushuaia</span>
    </div>

  </div>
</body>
</html>
